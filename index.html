<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cylian - cl.rip</title>
  <meta name="description" content="Cylian — Versailles, France." />
  <link rel="icon" href="favicon.ico" sizes="48x48" />
  <link rel="icon" href="m/favicon-16.png" sizes="16x16" type="image/png" />
  <link rel="icon" href="m/favicon-32.png" sizes="32x32" type="image/png" />
  <link rel="icon" href="m/favicon-192.png" sizes="192x192" type="image/png" />
  <link rel="apple-touch-icon" href="m/apple-touch-icon.png" sizes="180x180" />
  <link rel="manifest" href="site.webmanifest" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root { color-scheme: dark; --accent: #8A9A8B; }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Inter Tight", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      color: #eee;
      background: #242424;
      -webkit-font-smoothing: antialiased;
    }
    .wrap { width: 100%; max-width: 300px; }

    h1 { font-size: 1.6rem; font-weight: 600; letter-spacing: -0.02em; }
    .meta {
      margin-top: 2px;
      color: var(--accent);
      font-size: .95rem;
      font-variant-numeric: tabular-nums;
    }
    .meta #time { color: var(--accent); font-weight: 500; font-size: .85rem; }
    .divider { border: none; border-top: 1px solid #3a3a3a; margin: 10px 0; width: 100%; }
    .email {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #ccc;
      font-size: .95rem;
      text-decoration: none;
      transition: opacity .2s ease;
    }
    .email:hover { opacity: .7; }
    .email svg { width: 14px; height: 14px; flex-shrink: 0; }

    .actions { display: flex; gap: 10px; margin-top: 10px; width: fit-content; }
    .actions button {
      font: inherit;
      font-size: .95rem;
      color: #ccc;
      font-weight: 500;
      text-decoration: none;
      padding: 5px 12px;
      border: 1px solid #444;
      border-radius: 999px;
      background: none;
      cursor: pointer;
      transition: color .2s ease, border-color .2s ease;
    }
    .actions button:hover { color: var(--accent); border-color: var(--accent); }

    .wrap { transition: margin-right .32s cubic-bezier(.22,1,.36,1); }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .6);
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      z-index: 100;
      transition: opacity .25s ease, visibility 0s linear .25s;
    }
    .overlay.open {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
      transition: opacity .25s ease;
    }
    .overlay-content {
      position: fixed;
      top: 0; right: 0; bottom: 0;
      width: 100%;
      background: #2c2c2c;
      padding: 28px;
      overflow-y: auto;
      transform: translateX(100%);
      transition: transform .32s cubic-bezier(.22,1,.36,1);
    }
    .overlay.open .overlay-content { transform: translateX(0); }
    .overlay-close {
      position: absolute;
      top: 14px; left: 14px;
      background: none; border: none; cursor: pointer;
      font: inherit; font-size: 1.1rem; line-height: 1;
      color: #888;
      transition: color .2s ease;
    }
    .overlay-close:hover { color: var(--accent); }
    .overlay-section + .overlay-section {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid #444;
    }
    .overlay-section h2 {
      font-size: 1rem; font-weight: 600; color: var(--accent);
      margin-bottom: 8px;
    }
    .overlay-section p {
      font-size: .9rem; color: #888;
    }

    @media (min-width: 720px) {
      .overlay { background: none; }
      .overlay-content {
        width: 360px;
        box-shadow: -4px 0 24px rgba(0, 0, 0, .35);
        border-left: 1px solid #444;
      }
      body.sidebar-open .wrap { margin-right: 360px; }
    }

    .tools { width: fit-content; max-width: 100%; }
    .tools-label {
      font-size: .8rem; color: var(--accent); margin-bottom: 2px;
    }
    .tools ul { list-style: none; display: flex; flex-direction: column; gap: 2px; }
    .tools a {
      display: block;
      padding: 6px 0;
      color: #aaa;
      text-decoration: none;
      font-size: .95rem;
      transition: color .2s ease;
    }
    .tools a::after {
      content: "↗";
      font-size: .8em;
      margin-left: 4px;
      color: var(--accent);
    }
    .tools a:hover { color: var(--accent); }

    .tools-wrap { position: relative; }
    .tools-wrap ul { overflow: hidden; transition: max-height .42s cubic-bezier(.22,1,.36,1); }
    .tools-wrap.collapsed ul { max-height: 4.4rem; }
    .tools-wrap.collapsed::after {
      content: ""; position: absolute; left: 0; right: 0; bottom: 0; height: 1.4rem;
      background: linear-gradient(rgba(36,36,36,0), #242424 90%); pointer-events: none;
    }
    .show-more {
      margin-top: 2px;
      background: none; border: none; padding: 0; cursor: pointer;
      font-family: inherit; font-size: .85rem; color: #666;
      transition: color .2s ease;
    }
    .show-more:hover { color: var(--accent); }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Cylian</h1>
    <p class="meta">Versailles, France &middot; <span id="time"></span></p>

    <nav class="actions">
      <button type="button" id="open-overlay">Projects &amp; Experiences</button>
    </nav>

    <hr class="divider" id="divider-1" />

    <div class="tools" id="tools" hidden>
      <div class="tools-label">Tools</div>
      <div class="tools-wrap" id="tools-wrap">
        <ul id="tools-list"></ul>
      </div>
      <button class="show-more" id="show-more" hidden>Show more</button>
    </div>

    <hr class="divider" id="divider-2" />

    <a class="email" href="mailto:i@cl.rip">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="2" y="4" width="20" height="16" rx="2" />
        <path d="m22 6-10 7L2 6" />
      </svg>
      i@cl.rip
    </a>
  </div>

  <div class="overlay" id="overlay">
    <div class="overlay-content">
      <button class="overlay-close" id="overlay-close" aria-label="Close">&times;</button>
      <div class="overlay-section">
        <h2>Projects</h2>
        <p>Coming soon.</p>
      </div>
      <div class="overlay-section">
        <h2>Experience</h2>
        <p>Coming soon.</p>
      </div>
    </div>
  </div>

  <script>
    // Projects & Experiences overlay.
    const overlay = document.getElementById('overlay');
    const openBtn = document.getElementById('open-overlay');
    const closeBtn = document.getElementById('overlay-close');

    const openOverlay = () => {
      overlay.classList.add('open');
      document.body.classList.add('sidebar-open');
    };
    const closeOverlay = () => {
      overlay.classList.remove('open');
      document.body.classList.remove('sidebar-open');
    };

    openBtn.addEventListener('click', openOverlay);
    closeBtn.addEventListener('click', closeOverlay);
    overlay.addEventListener('click', (e) => {
      if (e.target === overlay) closeOverlay();
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && overlay.classList.contains('open')) closeOverlay();
    });
  </script>

  <script>
    // Size each divider to whichever neighboring element (above/below) is wider.
    const actionsEl = document.querySelector('.actions');
    const toolsEl = document.getElementById('tools');
    const emailEl = document.querySelector('.email');
    const divider1 = document.getElementById('divider-1');
    const divider2 = document.getElementById('divider-2');

    window.sizeDividers = () => {
      const actionsW = actionsEl.offsetWidth;
      const toolsW = toolsEl.hidden ? 0 : toolsEl.offsetWidth;
      const emailW = emailEl.offsetWidth;
      divider1.style.width = Math.max(actionsW, toolsW) + 'px';
      divider2.style.width = Math.max(toolsW, emailW) + 'px';
    };
    window.sizeDividers();
    if (document.fonts) document.fonts.ready.then(window.sizeDividers);
    window.addEventListener('resize', window.sizeDividers);
  </script>

  <script>
    // Live local time in Versailles (Europe/Paris).
    const timeEl = document.getElementById('time');
    const fmt = new Intl.DateTimeFormat('en-GB', {
      timeZone: 'Europe/Paris', hour: '2-digit', minute: '2-digit', hour12: false
    });
    const tick = () => { timeEl.textContent = fmt.format(new Date()); };
    tick();
    setInterval(tick, 10000);
  </script>

  <script>
    // Auto-discover tools from the GitHub repo, then use each file's <title>.
    const REPO = 'cyliannl/cl.rip';
    const DIR = 't';

    (async () => {
      let files;
      try {
        const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${DIR}`);
        if (!res.ok) return;
        files = (await res.json()).filter(f => f.type === 'file' && /\.html?$/i.test(f.name));
      } catch (_) { return; }
      if (!files || !files.length) return;

      // shuffle so the order changes each visit
      for (let i = files.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [files[i], files[j]] = [files[j], files[i]];
      }

      const list = document.getElementById('tools-list');
      document.getElementById('tools').hidden = false;
      window.sizeDividers();

      // collapse if there's more than one — show first, peek the second
      if (files.length > 1) {
        const wrap = document.getElementById('tools-wrap');
        const ul = list;
        const btn = document.getElementById('show-more');
        let open = false;
        wrap.classList.add('collapsed');
        btn.hidden = false;
        btn.addEventListener('click', () => {
          open = !open;
          if (open) {
            wrap.classList.remove('collapsed');
            ul.style.maxHeight = ul.scrollHeight + 'px';
            btn.textContent = 'Show less';
          } else {
            ul.style.maxHeight = ul.scrollHeight + 'px';
            requestAnimationFrame(() => {
              wrap.classList.add('collapsed');
              ul.style.maxHeight = '';
            });
            btn.textContent = 'Show more';
          }
        });
      }

      for (const f of files) {
        const li = document.createElement('li');
        const a = document.createElement('a');
        a.href = `${DIR}/${f.name.replace(/\.html?$/i, '')}`;
        a.textContent = f.name.replace(/\.html?$/i, '');
        li.appendChild(a);
        list.appendChild(li);
        window.sizeDividers();

        fetch(f.download_url)
          .then(r => r.ok ? r.text() : null)
          .then(html => {
            if (!html) return;
            const title = new DOMParser()
              .parseFromString(html, 'text/html')
              .querySelector('title')?.textContent.trim();
            if (title) a.textContent = title;
            window.sizeDividers();
          })
          .catch(() => {});
      }
    })();
  </script>
</body>
</html>
