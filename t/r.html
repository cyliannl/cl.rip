<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Clothing Downloader</title>
    <meta name="description" content="Extract and download the template texture from any Roblox classic clothing item. Supports shirts, pants, and T-shirts. Paste a catalog URL or asset ID to get the PNG template instantly.">
    <meta name="keywords" content="roblox clothing template, roblox shirt template, roblox pants template, roblox template extractor, roblox asset downloader, roblox classic clothing">

    <meta name="twitter:description" content="Extract and download the template texture from any Roblox classic clothing item. Paste a catalog URL or asset ID to get the PNG instantly.">
    <meta name="twitter:image" content="https://raw.githubusercontent.com/cyliannl/cylian.nl/main/tools/media/rbxextractor-thumbnail.svg">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { color-scheme: dark; --accent: #8A9A8B; }

        html, body { height: 100%; }
        body {
            font-family: "Inter Tight", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
            background: #242424;
            color: #eee;
            min-height: 100vh;
            padding: 40px;
            max-width: 460px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
        }

        .row {
            display: flex;
            align-items: center;
            border-bottom: 1px solid #444;
            transition: border-color .2s ease;
        }
        .row:focus-within { border-color: var(--accent); }

        input[type="text"] {
            flex: 1;
            border: none;
            outline: none;
            background: none;
            padding: .5rem .1rem;
            font-size: .95rem;
            font-family: inherit;
            color: #eee;
            min-width: 0;
        }
        input::placeholder { color: #666; }

        button.go {
            background: none;
            color: #ccc;
            border: none;
            padding: .5rem 0 .5rem .9rem;
            font-size: .95rem;
            cursor: pointer;
            white-space: nowrap;
            font-family: inherit;
            transition: color .2s ease;
        }
        button.go:hover { color: var(--accent); }
        button.go:disabled { opacity: .3; cursor: not-allowed; }

        #result { display: none; margin-top: 1.75rem; }
        #result.on { display: block; }

        .loading { text-align: center; color: var(--accent); font-size: .9rem; margin: 2.5rem 0; }

        #templateArea { display: none; }
        #templateArea.on { display: block; }

        .img-wrap {
            overflow: hidden;
            border: 1px solid #444;
            background: repeating-conic-gradient(#333 0% 25%, #242424 0% 50%) 0 0 / 16px 16px;
        }
        img { width: 100%; display: block; image-rendering: pixelated; }

        .acts { margin-top: .75rem; display: flex; gap: 16px; }
        .acts button {
            background: none;
            border: none;
            padding: 0;
            font-size: .9rem;
            cursor: pointer;
            font-family: inherit;
            color: #aaa;
            transition: color .2s ease;
        }
        .acts button:hover { color: var(--accent); }

        #errorBox {
            display: none;
            font-size: .9rem;
            color: #999;
            padding: 1rem 0;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
        }
        #errorBox.on { display: block; }

        #backBtn {
            display: none;
            align-self: flex-start;
            margin-bottom: 1rem;
            color: #888;
            font-size: .9rem;
            text-decoration: none;
            transition: color .2s ease;
        }
        #backBtn:hover { color: var(--accent); }
        #backBtn.on { display: block; }
    </style>
</head>
<body>

<a id="backBtn" href="https://cylian.nl">← back</a>
<div class="row">
    <input type="text" id="urlInput" placeholder="roblox.com/catalog/... or asset ID"
        onkeydown="if(event.key==='Enter')go()" autocomplete="new-password" spellcheck="false" />
    <button class="go" id="btn" onclick="go()">Extract</button>
</div>

<div id="result">
    <div class="loading" id="spin" style="display:none">Extracting…</div>
    <div id="templateArea">
        <div class="img-wrap" id="imgWrap"><img id="img" alt="" /></div>
        <div class="acts">
            <button onclick="dl()">Download</button>
            <button onclick="half()">Remove template/watermark</button>
        </div>
    </div>
    <div id="errorBox"></div>
</div>

<script>
((() => {
    const _h = atob('aHR0cHM6Ly9jbG90aGluZy10ZW1wbGF0ZS1leHRyYWN0b3IubWUtYjQwLndvcmtlcnMuZGV2Lw==');
    const _$ = id => document.getElementById(id);
    const _pat = [
        /roblox\.com\/catalog\/(\d+)/,
        /roblox\.com\/(?:library|asset|games).*[?&]id=(\d+)/i,
        /[?&]id=(\d+)/, /\/(\d+)(?:\/|$)/, /^(\d+)$/
    ];

    let _tid, _url, _blob, _last;
    const _cache = {};
    const _inp = _$('urlInput'), _btn = _$('btn');

    const _xid = s => { for (const p of _pat) { const m = s.trim().match(p); if (m) return m[1]; } return null; };

    _inp.addEventListener('input', () => { _btn.disabled = _inp.value.trim() === _last; });

    const _req = url => fetch(_h + '?url=' + encodeURIComponent(url), { signal: AbortSignal.timeout(20e3) })
        .then(r => { if (!r.ok) throw new Error(r.status); return r; });

    const _cdn = id => _req(`https://assetdelivery.roblox.com/v2/assetId/${id}`)
        .then(r => r.json())
        .then(d => {
            const loc = d.location ?? d.locations?.[0]?.location ?? null;
            if (!loc) throw new Error('unresolved:' + id);
            return loc;
        });

    const _ui = (loading, area, err) => {
        _$('result').classList.add('on');
        _$('spin').style.display = loading ? 'block' : 'none';
        _$('templateArea').className = area ? 'on' : '';
        _$('errorBox').className = err ? 'on' : '';
    };

    const _png = async (url, cid) => {
        const el = _$('img');
        el.src = '';
        try {
            const bmp = await createImageBitmap(await _req(url).then(r => r.blob()));
            const cv = Object.assign(document.createElement('canvas'), { width: bmp.width, height: bmp.height });
            cv.getContext('2d').drawImage(bmp, 0, 0);
            if (_blob) URL.revokeObjectURL(_blob);
            _blob = await new Promise(res => cv.toBlob(b => res(URL.createObjectURL(b)), 'image/png'));
            el.src = _blob;
            if (cid && _cache[cid]) _cache[cid].blobUrl = _blob;
        } catch { el.src = url; }
    };

    const _render = (type, tid, url, blobUrl, cid) => {
        _ui(false, true, false);
        if (blobUrl) { _blob = blobUrl; _$('img').src = blobUrl; }
        else _png(url, cid);
    };

    const _err = msg => { _ui(false, false, true); _$('errorBox').textContent = msg; };

    const go = async () => {
        const val = _inp.value.trim();
        const id = _xid(val);
        if (!id) return _err('No asset ID found.');

        if (_cache[id]) {
            const e = _cache[id];
            _tid = e.tid; _url = e.url; _last = val; _btn.disabled = true;
            return _render(e.type, e.tid, e.url, e.blobUrl, id);
        }

        _ui(true, false, false); _btn.disabled = true; _last = val;

        try {
            const base = await _cdn(id);
            const raw  = await _req(base).then(r => r.text());

            if (!raw.trimStart().startsWith('<')) {
                _tid = id; _url = base;
                _cache[id] = { type: 'T-Shirt', tid: id, url: base };
                return _render('T-Shirt', id, base, null, id);
            }

            const xml = new DOMParser().parseFromString(raw, 'text/xml');
            if (xml.querySelector('parsererror')) throw new Error('Not a classic clothing item.');

            const sh = xml.querySelector('Item[class="Shirt"]');
            const pa = xml.querySelector('Item[class="Pants"]');
            let tp = 'Classic', el = null;

            if (sh) { tp = 'Shirt';  el = sh.querySelector('Content[name="ShirtTemplate"] url'); }
            else if (pa) { tp = 'Pants'; el = pa.querySelector('Content[name="PantsTemplate"] url'); }
            if (!el) for (const n of xml.querySelectorAll('url'))
                if (n.textContent.includes('roblox.com/asset')) { el = n; break; }
            if (!el) throw new Error('No template texture found.');

            const tid = _xid(el.textContent.trim());
            if (!tid) throw new Error('Could not parse texture ID.');

            const tUrl = await _cdn(tid);
            _tid = tid; _url = tUrl;
            _cache[id] = { type: tp, tid, url: tUrl };
            _render(tp, tid, tUrl, null, id);

        } catch (e) { _err(e.message); _last = null; _btn.disabled = false; }
    };

    const dl = async () => {
        if (!_url) return;
        const src = _blob || URL.createObjectURL(await _req(_url).then(r => r.blob()));
        Object.assign(document.createElement('a'), { href: src, download: `template-${_tid}.png` }).click();
    };

    const half = async () => {
        const el = _$('img');
        if (!el.src) return;
        const src = el.src;
        const img = new Image();
        img.src = src;
        await new Promise(res => img.onload = res);
        const cv = Object.assign(document.createElement('canvas'), { width: 585, height: 559 });
        const ctx = cv.getContext('2d');
        ctx.drawImage(img, 0, 0);
        ctx.clearRect(0, 0, 165, 355);
        ctx.clearRect(0, 0, 231, 74);
        ctx.clearRect(0, 0, 19, 559);
        ctx.clearRect(0, 559 - 76, 217, 76);
        ctx.clearRect(0, 0, 585, 8);
        ctx.clearRect(585 - 15, 0, 15, 559);
        ctx.clearRect(0, 559 - 10, 585, 10);
        ctx.clearRect(585 - 226, 0, 226, 74);
        ctx.clearRect(229, 0, 2, 289);
        ctx.clearRect(359, 0, 2, 289);
        ctx.clearRect(0, 268, 585, 21);
        ctx.clearRect(0, 202, 585, 2);
        ctx.clearRect(0, 72, 585, 2);
        ctx.clearRect(0, 353, 585, 2);
        ctx.clearRect(0, 483, 585, 2);
        ctx.clearRect(425, 0, 2, 289);
        ctx.clearRect(585 - 30, 0, 30, 235);
        ctx.clearRect(359, 202, 221, 87);
        ctx.clearRect(0, 202, 231, 87);
        ctx.clearRect(372, 202, 213, 153);
        ctx.clearRect(372, 483, 213, 77);
        ctx.clearRect(0, 272, 217, 83);
        ctx.clearRect(83, 210, 2, 349);
        ctx.clearRect(149, 210, 2, 349);
        ctx.clearRect(215, 210, 2, 349);
        ctx.clearRect(281, 280, 27, 349);
        ctx.clearRect(372, 210, 2, 349);
        ctx.clearRect(438, 210, 2, 349);
        ctx.clearRect(504, 210, 2, 349);
        if (_blob) URL.revokeObjectURL(_blob);
        _blob = await new Promise(res => cv.toBlob(b => res(URL.createObjectURL(b)), 'image/png'));
        el.src = _blob;
        await new Promise(r => { el.onload = r; });
    };

    if (window.location.search) _$('backBtn').classList.add('on');

    Object.assign(window, { go, dl, half });
})());
</script>
</body>
</html>
